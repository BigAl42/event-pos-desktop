# Desktop-Bundles (Linux / Windows / macOS) nur nach grünen Tests.
# Auslöser: Version-Tags v*.*.* oder manuell (workflow_dispatch).

name: Release desktop bundles

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies (glib/gdk/pkg-config)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libgtk-3-dev

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}

      - name: Run cargo test (with test feature for integration tests)
        run: cd src-tauri && cargo test --features test

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run frontend tests
        run: npm run test:run

  desktop-bundle:
    name: Tauri bundle (${{ matrix.os }})
    needs: [rust, frontend]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies (Tauri/WebView)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: src-tauri/target
          key: cargo-${{ matrix.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Tauri build
        run: npx tauri build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kassensystem-bundle-${{ matrix.os }}-${{ github.ref_name }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: error
